<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Terminal MCP | Dashboard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=JetBrains+Mono&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/xterm@5.3.0/css/xterm.css" />
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <aside id="sidebar">
        <h1>Terminal MCP</h1>
        
        <div class="session-section">
            <span class="section-label">Active Sessions</span>
            <ul id="session-list">
                <!-- Sessions will be loaded here -->
            </ul>
        </div>

        <div style="margin-top: auto;">
            <span class="section-label">Server Status</span>
            <div style="display: flex; align-items: center; gap: 8px; font-size: 13px;">
                <span class="status-indicator running"></span>
                Connected to Node Engine
            </div>
        </div>
    </aside>

    <main id="main-content">
        <header class="header">
            <div>
                <div id="current-session-title" class="session-title-large">Welcome</div>
                <div id="current-session-info" style="font-size: 13px; color: var(--text-secondary); margin-top: 4px;">Select a terminal session to begin</div>
            </div>
            <div id="session-actions" style="display: none;">
                <button id="btn-stop" style="background: rgba(239, 68, 68, 0.1); color: #ef4444; border: 1px solid rgba(239, 68, 68, 0.2); padding: 8px 16px; border-radius: 8px; cursor: pointer; font-size: 13px; font-weight: 600;">Stop Process</button>
            </div>
        </header>

        <section id="terminal-frame">
            <div id="terminal-container"></div>
            <div class="input-area">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"></polyline></svg>
                <input type="text" id="terminal-input" placeholder="Type a command and press Enter..." autocomplete="off">
            </div>
        </section>
    </main>

    <!-- xterm.js and its fit addon -->
    <script src="https://cdn.jsdelivr.net/npm/xterm@5.3.0/lib/xterm.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/xterm-addon-fit@0.8.0/lib/xterm-addon-fit.js"></script>
    <script src="script.js"></script>
</body>
</html>
